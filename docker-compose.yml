services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: deps
    ports:
      - "3000:3000"
    env_file: ./apps/web/.env.local
    environment:
      - NODE_ENV=development
    command: npm run dev
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: builder
    ports:
      - "3001:3001"
    env_file: ./apps/api/.env
    environment:
      - NODE_ENV=development
    command: sh -c "npx prisma db push && npm run start:dev"
    depends_on:
      - qdrant
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ./apps/ai/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - qdrant
    volumes:
      - ./apps/ai:/app
      - deepface_models:/root/.deepface

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - web
      - api
      - ai

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
  deepface_models:
