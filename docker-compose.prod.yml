services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_AI_WS_URL: ${NEXT_PUBLIC_AI_WS_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    # No ports — web is only reachable through nginx, not directly from the internet
    env_file: ./apps/web/.env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    # No ports — api is only reachable through nginx
    env_file: ./apps/api/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    # No ports — ai is only reachable through nginx
    env_file: ./apps/ai/.env
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - deepface_models:/root/.deepface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    # No ports — qdrant is only reachable by api and ai internally
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
  deepface_models:
