services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: ./apps/web/.env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file: ./apps/api/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - qdrant

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ./apps/ai/.env
    restart: unless-stopped
    depends_on:
      - qdrant
    volumes:
      - deepface_models:/root/.deepface

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    depends_on:
      - web
      - api
      - ai

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
  deepface_models:
