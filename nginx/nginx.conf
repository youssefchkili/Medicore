events {
  worker_connections 1024;
}

http {
  upstream nestjs {
    server api:3001;
  }

  upstream fastapi {
    server ai:8000;
  }

  upstream nextjs {
    server web:3000;
  }

  # Plain HTTP: redirect everything to HTTPS. Cloudflare's "Full (strict)"
  # mode always connects to the origin over 443, but this covers direct
  # hits and keeps "Always Use HTTPS" consistent end to end.
  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;

    # Origin certificate issued by Cloudflare (SSL/TLS > Origin Server).
    # Only trusted by Cloudflare's edge, not public browsers — that's fine
    # since real traffic reaches this server exclusively through Cloudflare.
    ssl_certificate     /etc/nginx/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;

    # NestJS REST API
    location /api/ {
      proxy_pass http://nestjs/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI AI microservice — supports HTTP + WebSocket
    location /ai/ {
      proxy_pass http://fastapi/;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Next.js frontend (catch-all)
    location / {
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
